<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elysium DayZ — Кланы</title>
</head>
<body>

<h1>Панель кланов</h1>

<div id="statusText">LOADING</div>
<div id="clansGrid"></div>

<script>

let allClans = {}

function renderClans(data){
  const grid = document.getElementById("clansGrid")
  grid.innerHTML = ""

  Object.entries(data).forEach(([name, clan]) => {
    const div = document.createElement("div")
    div.innerHTML = `
      <h2>${name}</h2>
      <p>Лидер: ${clan.leader_name || "—"}</p>
      <p>Статус: ${clan.status || "—"}</p>
      <p>Участников: ${(clan.members || []).length}</p>
      <hr>
    `
    grid.appendChild(div)
  })
}

async function loadClans(){

  const statusText = document.getElementById("statusText")
  statusText.innerText = "LOADING"

  try{

    const response = await fetch(
      "https://raw.githubusercontent.com/moriartielysium/elysium-dayz-data/main/clans.json?ts=" + Date.now(),
      { cache: "no-store" }
    )

    if(!response.ok){
      throw new Error("JSON not loaded")
    }

    allClans = await response.json()
    renderClans(allClans)

    statusText.innerText = "ONLINE"

  }catch(err){

    statusText.innerText = "ERROR"
    document.getElementById("clansGrid").innerHTML = "Ошибка загрузки данных"

  }
}

loadClans()

setInterval(loadClans,60000)

</script>

</body>
</html>
