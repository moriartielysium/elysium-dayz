<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elysium DayZ — Кланы</title>
  <style>
    :root {
      --bg: #0b0d0b;
      --panel: rgba(16, 18, 15, 0.9);
      --panel-2: rgba(25, 28, 23, 0.92);
      --text: #ebe4cf;
      --muted: #b7ae94;
      --accent: #7f9256;
      --accent-2: #56643a;
      --line: rgba(180, 170, 130, 0.18);
      --shadow: 0 18px 38px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(8, 9, 8, 0.7), rgba(8, 9, 8, 0.95)),
        url("https://i.postimg.cc/jSsVyjSM/Baner-ELYSIUM.png") center/cover fixed;
      min-height: 100vh;
    }

    .container {
      width: min(1200px, calc(100% - 24px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .hero {
      text-align: center;
      padding: 30px 0 18px;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.6px;
      background: rgba(20, 22, 19, 0.72);
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 82px);
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 8px 22px rgba(0, 0, 0, 0.55);
    }

    .subtitle {
      max-width: 760px;
      margin: 18px auto 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }

    .toolbar {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin: 28px 0 18px;
    }

    .search {
      flex: 1;
      min-width: 260px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(20, 22, 19, 0.8);
      color: var(--text);
      outline: none;
    }

    .btn {
      border: none;
      padding: 14px 18px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      color: #f5f1e4;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 24px rgba(86, 100, 58, 0.35);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin: 14px 0 28px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(6px);
    }

    .stat strong {
      display: block;
      font-size: 30px;
      margin-bottom: 6px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 0.9fr;
      gap: 18px;
      align-items: start;
    }

    .clans-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .clan-card {
      position: relative;
      overflow: hidden;
    }

    .clan-card::after {
      content: "";
      position: absolute;
      right: -30px;
      bottom: -30px;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(127,146,86,0.18), transparent 70%);
    }

    .tag {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      margin-bottom: 14px;
    }

    .clan-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .clan-name {
      margin: 0;
      font-size: 28px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .rank {
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 10px;
    }

    .meta {
      display: grid;
      gap: 8px;
      color: var(--muted);
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .members-title,
    .side-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.3px;
      color: #d9d1b8;
      margin-bottom: 10px;
    }

    .members-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .member {
      padding: 8px 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      font-size: 13px;
    }

    .sidebar {
      display: grid;
      gap: 18px;
    }

    .side-item {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .side-item strong {
      color: var(--text);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 30px 20px;
    }

    footer {
      text-align: center;
      color: #9d947b;
      margin-top: 34px;
      font-size: 14px;
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <div class="eyebrow">Elysium DayZ • clan panel</div>
      <h1>ELYSIUM</h1>
      <p class="subtitle">
        Панель кланов сервер ELYSIUM, здесь отображаются все активных кланы.
      </p>
    </section>

    <div class="toolbar">
      <input id="searchInput" class="search" type="text" placeholder="Поиск клана..." />
      <button class="btn" onclick="loadClans()">Обновить</button>
    </div>

    <section class="stats">
      <div class="stat">
        <strong id="clanCount">0</strong>
        <span>Кланов</span>
      </div>
      <div class="stat">
        <strong id="memberCount">0</strong>
        <span>Игроков</span>
      </div>
      <div class="stat">
        <strong id="topClan">—</strong>
        <span>Топ клан</span>
      </div>
      <div class="stat">
        <strong id="statusText">OFFLINE</strong>
        <span>Статус данных</span>
      </div>
    </section>

    <section class="layout">
      <div>
        <div class="clans-grid" id="clansGrid"></div>
      </div>

      <aside class="sidebar">
        <div class="card">
          <div class="side-title">Топ кланы</div>
          <div id="topClansList"></div>
        </div>

        <div class="card">
          <div class="side-title">Территории</div>
          <div id="territoriesList"></div>
        </div>
      </aside>
    </section>

    <footer>
      Elysium DayZ • Russian server Dayz
    </footer>
  </main>

  <script>
    let allClans = {};

    function renderClans(data) {
      const searchValue = document.getElementById("searchInput").value.toLowerCase();
      const entries = Object.entries(data).filter(([name]) =>
        name.toLowerCase().includes(searchValue)
      );

      const sorted = [...entries].sort((a, b) =>
        (b[1].members?.length || 0) - (a[1].members?.length || 0)
      );

      const clansGrid = document.getElementById("clansGrid");
      const topClansList = document.getElementById("topClansList");
      const territoriesList = document.getElementById("territoriesList");

      clansGrid.innerHTML = "";
      topClansList.innerHTML = "";
      territoriesList.innerHTML = "";

      document.getElementById("clanCount").textContent = sorted.length;
      document.getElementById("memberCount").textContent = sorted.reduce(
        (sum, [, clan]) => sum + (clan.members?.length || 0),
        0
      );
      document.getElementById("topClan").textContent = sorted[0]?.[0] || "—";

      if (!sorted.length) {
        clansGrid.innerHTML = `<div class="card empty">Кланы не найдены</div>`;
        return;
      }

      sorted.forEach(([name, clan], index) => {
        const members = Array.isArray(clan.members) ? clan.members : [];
        const membersHtml = members.length
          ? members.map(member => `<span class="member">${member.name || "Без имени"}</span>`).join("")
          : `<span class="member">Нет участников</span>`;

        const card = document.createElement("article");
        card.className = "card clan-card";
        card.innerHTML = `
          <div class="tag">${clan.location || "Неизвестный сектор"}</div>
          <div class="clan-head">
            <h2 class="clan-name">${name}</h2>
            <div class="rank">#${index + 1}</div>
          </div>
          <div class="meta">
            <div><strong>Лидер:</strong> ${clan.leader_name || "Неизвестно"}</div>
            <div><strong>Статус:</strong> ${clan.status || "Активен"}</div>
            <div><strong>Участников:</strong> ${members.length}</div>
            <div><strong>Сила клана:</strong> ${members.length * 10}</div>
          </div>
          <div class="members-title">Состав</div>
          <div class="members-list">${membersHtml}</div>
        `;
        clansGrid.appendChild(card);
      });

      sorted.slice(0, 5).forEach(([name, clan], index) => {
        const item = document.createElement("div");
        item.className = "side-item";
        item.innerHTML = `<strong>#${index + 1} ${name}</strong><br>${clan.members?.length || 0} участников`;
        topClansList.appendChild(item);
      });

      sorted.forEach(([name, clan]) => {
        const item = document.createElement("div");
        item.className = "side-item";
        item.innerHTML = `<strong>${clan.location || "Неизвестно"}</strong><br>${name}`;
        territoriesList.appendChild(item);
      });
    }

    async function loadClans() {
      const statusText = document.getElementById("statusText");
      statusText.textContent = "LOADING";

      try {
        const response = await fetch("./clans.json?ts=" + Date.now());
        if (!response.ok) throw new Error("Failed to load clans.json");

        allClans = await response.json();
        renderClans(allClans);
        statusText.textContent = "ONLINE";
      } catch (error) {
        document.getElementById("clansGrid").innerHTML = `<div class="card empty">Ошибка загрузки данных</div>`;
        document.getElementById("topClansList").innerHTML = "";
        document.getElementById("territoriesList").innerHTML = "";
        document.getElementById("clanCount").textContent = "0";
        document.getElementById("memberCount").textContent = "0";
        document.getElementById("topClan").textContent = "—";
        statusText.textContent = "ERROR";
      }
    }

    document.getElementById("searchInput").addEventListener("input", () => {
      renderClans(allClans);
    });

    loadClans();
    setInterval(loadClans, 10000);
  </script>
</body>
</html>
