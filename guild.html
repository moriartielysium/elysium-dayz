<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elysium Guild</title>
  <style>
    :root { --bg:#0b0d0b; --panel:rgba(16,18,15,.9); --text:#ebe4cf; --muted:#b7ae94; --accent:#7f9256; --accent2:#56643a; --line:rgba(180,170,130,.18); --shadow:0 18px 38px rgba(0,0,0,.45);} *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--text);background:linear-gradient(rgba(8,9,8,.72), rgba(8,9,8,.96)), url("https://i.postimg.cc/jSsVyjSM/Baner-ELYSIUM.png") center/cover fixed;min-height:100vh} .container{width:min(900px,calc(100% - 24px));margin:0 auto;padding:28px 0 48px}.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow)} .btn{display:inline-block;padding:10px 18px;border-radius:12px;text-decoration:none;font-weight:700;color:#f5f1e4;background:linear-gradient(180deg,#7f9256,#56643a);border:1px solid rgba(180,170,130,.18);box-shadow:0 8px 18px rgba(0,0,0,.35)} .muted{color:var(--muted)} .row{margin:8px 0}</style>
</head>
<body>
  <main class="container">
    <div class="card">
      <h1>Guild Settings</h1>
      <div class="row muted" id="guildId">Guild ID: loading...</div>
      <div class="row muted">Это стартовая страница V1. Следующий шаг — поля настроек и сохранение в БД.</div>
      <div style="margin-top:16px"><a class="btn" href="/dashboard.html">Back to dashboard</a></div>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById("guildId").textContent = "Guild ID: " + (params.get("id") || "not provided");
  </script>
</body>
</html>
